name: CI — CampusOffice ERP

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

jobs:
  # ─────────────────────────────────────────────────────────
  backend-lint:
    name: Backend — Lint & Import Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint with flake8
        run: |
          pip install flake8
          flake8 app/ --max-line-length=120 --ignore=E501,W503,E302,E303 --exclude=__pycache__

      - name: Verify application imports
        env:
          DATABASE_URL: postgresql://postgres:test@localhost/test
          REDIS_URL: redis://localhost:6379
          SECRET_KEY: ci-test-secret-key
          FRONTEND_URL: http://localhost:5173
        run: python -c "import app.main; print('Backend imports OK')"

  # ─────────────────────────────────────────────────────────
  frontend-check:
    name: Frontend — TypeScript & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Build production bundle
        run: npm run build

      - name: Check bundle size (warn if > 2MB)
        run: |
          SIZE=$(du -sk dist/assets/ | cut -f1)
          echo "Bundle size: ${SIZE}KB"
          if [ "$SIZE" -gt 2048 ]; then
            echo "::warning::Bundle size ${SIZE}KB exceeds 2MB — consider code splitting"
          fi

  # ─────────────────────────────────────────────────────────
  docker-validate:
    name: Docker — Build & Compose Validation
    runs-on: ubuntu-latest
    needs: [backend-lint, frontend-check]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          tags: mini-campus-erp-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          tags: mini-campus-erp-frontend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Validate docker-compose.yml
        run: docker compose -f docker-compose.yml config --quiet

      - name: Validate docker-compose.prod.yml overlay
        run: docker compose -f docker-compose.yml -f docker-compose.prod.yml config --quiet
